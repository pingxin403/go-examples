<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .title }}</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 0 20px;
            line-height: 1.6;
            color: #333;
        }
        h1 { color: #2c3e50; }
        .info {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        .endpoint {
            background: #e9ecef;
            padding: 8px 12px;
            border-radius: 4px;
            font-family: monospace;
            margin: 5px 0;
        }
        .time {
            color: #6c757d;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <h1>{{ .title }}</h1>
    <p class="time">服务器时间: {{ .time }}</p>

    <div class="info">
        <p>{{ .message }}</p>
    </div>

    <h2>可用接口</h2>
    <div class="endpoint">GET /ping — 健康检查</div>
    <div class="endpoint">GET /hello?name=xxx — 问候</div>
    <div class="endpoint">GET /api/v1/users — 用户列表</div>
    <div class="endpoint">POST /api/v1/users — 创建用户</div>
    <div class="endpoint">GET /static/ — 静态文件</div>
</body>
</html>
